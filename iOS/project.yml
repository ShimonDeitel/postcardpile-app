name: Postcard Pile
options:
  bundleIdPrefix: com.shimondeitel.postcardpile
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Postcard Pile:
    type: application
    platform: iOS
    sources:
      - path: Postcard Pile
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.postcardpile
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Postcard Pile/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  Postcard PileTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Postcard PileTests
      - path: Postcard Pile.storekit
    dependencies:
      - target: Postcard Pile
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.postcardpile.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  Postcard PileUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: Postcard PileUITests
    dependencies:
      - target: Postcard Pile
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.postcardpile.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Postcard Pile:
    build:
      targets:
        Postcard Pile: all
        Postcard PileTests: [test]
        Postcard PileUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Postcard Pile.storekit
    test:
      config: Debug
      storeKitConfiguration: Postcard Pile.storekit
      targets:
        - Postcard PileTests
        - Postcard PileUITests
    archive:
      config: Release
